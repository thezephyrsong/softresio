databases:
  - name: softres-db
    databaseName: softres
    user: softres
    plan: free # or standard

services:
  - type: web
    name: softresio
    env: docker
    plan: free # or standard
    repo: https://github.com/thezephyrsong/softresio # or your fork
    branch: main
    envVars:
      - key: DATABASE_USER
        fromDatabase:
          name: softres-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: softres-db
          property: password
      - key: DATABASE_HOST
        fromDatabase:
          name: softres-db
          property: host
      - key: DATABASE_PORT
        fromDatabase:
          name: softres-db
          property: port
      - key: DATABASE_NAME
        fromDatabase:
          name: softres-db
          property: database
      - key: SCHEME
        value: https
      - key: DOMAIN
        sync: false # Set this to your Render app URL (e.g., your-app.onrender.com)
      - key: JWT_SECRET
        generateValue: true
      # Optional: Add Discord login variables if you want them
      # - key: DISCORD_LOGIN_ENABLED
      #   value: "true"
      # - key: DISCORD_CLIENT_ID
      #   sync: false
      # - key: DISCORD_CLIENT_SECRET
      #   sync: false
